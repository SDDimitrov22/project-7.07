<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Linear Regression AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
<h1>Linear Regression AI</h1>
<p class="description">
       Моделът е обучен да намира стойности по формулата:
<strong>y = 2x + 1</strong>
</p>
<form method="POST">
<label for="x">Въведи x:</label>
<input
           type="number"
           step="any"
           name="x"
           id="x"
           placeholder="Например 5"
           required
>
<button type="submit">Изчисли</button>
</form>
   {% if result is not none %}
<div class="result">
<p>Въведено x: <strong>{{ entered_x }}</strong></p>
<h2>Резултат y: {{ result }}</h2>
</div>
   {% endif %}
<div class="info">
<p>Weight: {{ weight }}</p>
<p>Bias: {{ bias }}</p>
</div>
</div>
</body>
</html>

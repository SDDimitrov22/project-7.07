<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>AI Models Project</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <div class="nav-content">
        <a class="logo" href="/">AI Models</a>

        <div class="links">
            {% if session.get("username") %}
                <a href="/dashboard">Dashboard</a>
                <a href="/models">Models</a>
                <a href="/linear-regression">Linear Regression</a>
                <a href="/perceptron">Perceptron</a>
                <a href="/logistic-regression">Logistic Regression</a>
                <a href="/softmax-regression">Softmax Regression</a>
                <a href="/history">History</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/register">Register</a>
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    AI Models Project - Flask
</footer>

</body>
</html>
